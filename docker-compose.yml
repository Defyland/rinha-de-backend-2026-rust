services:
  load-balancer:
    image: nginx:1.27-alpine
    depends_on:
      - api-1
      - api-2
    ports:
      - "9999:9999"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 32M

  api-1:
    build:
      context: .
    environment:
      BIND_ADDR: 0.0.0.0:9999
      RINHA_REFERENCES_PATH: /app/resources/example-references.json
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 96M

  api-2:
    build:
      context: .
    environment:
      BIND_ADDR: 0.0.0.0:9999
      RINHA_REFERENCES_PATH: /app/resources/example-references.json
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 96M
